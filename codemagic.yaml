workflows:
  android-apk:
    name: BeatFlow Android APK
    max_build_duration: 60

    instance_type: mac_mini_m2  # 👈 THIS enables Apple Silicon (M2)

    environment:
      flutter: 3.24.0
      java: 17
      vars:
        PACKAGE_NAME: "com.kayode.beatflow"

    scripts:
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$FLUTTER_ROOT" > "$CM_BUILD_DIR/android/local.properties"
          echo "flutter.versionName=1.0.0" >> "$CM_BUILD_DIR/android/local.properties"
          echo "flutter.versionCode=1" >> "$CM_BUILD_DIR/android/local.properties"

      - name: Get Flutter packages
        script: flutter pub get

      - name: Build debug APK
        script: flutter build apk --debug

    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk


  android-apk-release:
    name: BeatFlow Android APK (Release)
    max_build_duration: 60

    instance_type: mac_mini_m2  # 👈 required here too

    environment:
      flutter: 3.24.0
      java: 17
      vars:
        PACKAGE_NAME: "com.kayode.beatflow"

    scripts:
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$FLUTTER_ROOT" > "$CM_BUILD_DIR/android/local.properties"
          echo "flutter.versionName=1.0.0" >> "$CM_BUILD_DIR/android/local.properties"
          echo "flutter.versionCode=1" >> "$CM_BUILD_DIR/android/local.properties"

      - name: Get Flutter packages
        script: flutter pub get

      - name: Build release APK (unsigned)
        script: flutter build apk --release --no-shrink

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
