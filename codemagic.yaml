workflows:
  android-apk:
    name: PulseDeck Android APK
    instance_type: mac_mini_2
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Flutter doctor
        script: |
          flutter doctor -v
      - name: Get dependencies
        script: |
          flutter pub get
      - name: Ensure Gradle wrapper exists
        script: |
          cd android
          if [ ! -f "gradlew" ]; then
            gradle wrapper --gradle-version 8.10.2
          fi
          chmod +x gradlew || true
      - name: Build release APK
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: false
          failure: true
