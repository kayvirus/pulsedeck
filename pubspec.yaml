name: pulsedeck
description: A modern Flutter music player.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  permission_handler: ^11.4.0

  # REPLACE THIS:
  on_audio_query: ^1.1.0

  # WITH THIS:
  on_audio_query_forked: ^2.9.1

  just_audio: ^0.10.5
  just_audio_background: ^0.0.1-beta.17
  audio_session: ^0.1.21
  audio_video_progress_bar: ^2.0.3
  dio: ^5.8.0+1
  youtube_explode_dart: ^2.3.6
  youtube_player_iframe: ^5.2.1
  palette_generator: ^0.3.3+6
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  collection: ^1.19.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
