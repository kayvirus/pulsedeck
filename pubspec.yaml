name: beatflow
description: BeatFlow - Your personal music universe
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  
  # Audio playback
  just_audio: ^0.9.36
  just_audio_background: ^0.0.1-beta.11
  audio_service: ^0.18.13
  audio_session: ^0.1.18

  # Local media
  on_audio_query: ^2.9.0
  permission_handler: ^11.3.0
  
  # State management
  provider: ^6.1.2
  
  # Navigation
  go_router: ^13.2.0
  
  # UI
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  palette_generator: ^0.3.3+3
  animations: ^2.0.11
  lottie: ^3.1.0
  
  # YouTube
  youtube_explode_dart: ^2.2.1
  
  # HTTP & Storage
  http: ^1.2.0
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Utilities
  url_launcher: ^6.2.5
  path_provider: ^2.1.2
  share_plus: ^9.0.0
  rxdart: ^0.27.7
  equatable: ^2.0.5
  intl: ^0.19.0
  marquee: ^2.2.3
  sliding_up_panel: ^2.0.0+1
  flutter_staggered_animations: ^1.1.1
  connectivity_plus: ^6.0.3
  
  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: Satoshi
      fonts:
        - asset: assets/fonts/Satoshi-Regular.ttf
        - asset: assets/fonts/Satoshi-Medium.ttf
          weight: 500
        - asset: assets/fonts/Satoshi-Bold.ttf
          weight: 700
        - asset: assets/fonts/Satoshi-Black.ttf
          weight: 900
