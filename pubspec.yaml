name: pulsedeck
description: Personal-first Flutter music player with local playback and federated online discovery.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  just_audio: ^0.10.5
  just_audio_background: ^0.0.1-beta.18
  audio_service: ^0.18.18
  dio: ^5.9.0
  file_picker: ^10.3.2
  path: ^1.9.1
  permission_handler: ^12.0.1
  shared_preferences: ^2.5.3
  youtube_explode_dart: ^3.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
